<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers 整合</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>

    <style>
        #mapCon {
            width: 100%;
            height: 95%;
            position: absolute;
        }

        /*测量菜单的样式信息*/
        #menu {
            float: left;
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 4px;
        }

        /**
        * 编辑菜单的样式信息
        */
        #edit-menu {
            position: absolute;
            bottom: 60px;
            left: 15px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 4px;
        }

        .checkbox {
            left: 20px;
        }

        /**
        * 提示框的样式信息
        */
        .tooltip {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            color: white;
            padding: 4px 8px;
            opacity: 0.7;
            white-space: nowrap;
        }

        .tooltip-measure {
            opacity: 1;
            font-weight: bold;
        }

        .tooltip-static {
            background-color: #ffcc33;
            color: black;
            border: 1px solid white;
        }

        .tooltip-measure:before,
        .tooltip-static:before {
            border-top: 6px solid rgba(0, 0, 0, 0.5);
            border-right: 6px solid transparent;
            border-left: 6px solid transparent;
            content: "";
            position: absolute;
            bottom: -6px;
            margin-left: -7px;
            left: 50%;
        }

        .tooltip-static:before {
            border-top-color: #ffcc33;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        /* 1. 地图容器 */
        #map {
            width: 100%;
            height: 100vh;
            /* 全屏显示 */
            position: relative;
            background-color: #f8f8f8;
        }

        /* 2. 坐标显示控件自定义样式 */
        .custom-mouse-position {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            color: #333;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* 3. 鹰眼控件自定义样式 */
        /* 将其定位在右上角 */
        .ol-overviewmap {
            top: 10px;
            right: 10px;
            bottom: auto;
            left: auto;
        }

        /* 鹰眼内部地图窗口的样式 */
        .ol-overviewmap .ol-overviewmap-map {
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            height: 150px;
            width: 200px;
        }

        /* 鹰眼中表示当前视口的矩形框样式 */
        .ol-overviewmap .ol-overviewmap-box {
            border: 2px solid #ff4500;
            background-color: rgba(255, 69, 0, 0.1);
        }

        /* 覆盖 OpenLayers 默认按钮样式，使其更协调 */
        .ol-overviewmap button {
            background-color: #007bff;
            cursor: pointer;
        }

        /* 弹性定位按钮样式 */
        .button {
            position: absolute;
            top: 15px;
            right: 250px;
            /* 从 60px 改为 250px，避开右上角的鹰眼地图 */
            z-index: 1000;
            background-color: #28a745;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: #218838;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        /* 自定义弹窗样式 */
        #custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #custom-modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .custom-modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 380px;
            max-width: 90%;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #custom-modal-overlay.show .custom-modal-content {
            transform: scale(1);
        }

        .custom-modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .custom-modal-body {
            font-size: 15px;
            color: #4a4a4a;
            line-height: 1.6;
            margin-bottom: 24px;
            white-space: pre-wrap;
        }

        .custom-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .custom-modal-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .custom-modal-btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .custom-modal-btn-cancel:hover {
            background: #e8e8e8;
        }

        .custom-modal-btn-confirm {
            background: #28a745;
            color: white;
        }

        .custom-modal-btn-confirm:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <div id="map">
        <div id="mouse-position" class="custom-mouse-position"></div>
        <div id="layer-switcher"
            style="position: absolute; top: 15px; left: 50px; z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif; font-size: 14px;">
            <label style="cursor:pointer;"><input type="radio" name="baseLayer" value="osm" checked> 默认：矢量图层
                (OSM)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="imagery"> 默认：遥感影像 (ESRI)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="baidu"> 百度地图 (Baidu)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="gaode"> 高德地图 (Gaode)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="spyglass"> 裁剪：探照灯模式</label>
            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #ccc;">
            <label style="cursor:pointer; display:inline-block;"><input type="checkbox" id="kmlToggle" checked> 2012地震数据
                (KML)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="checkbox" id="gpxToggle"
                    checked> GPS轨迹 (GPX)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="checkbox"
                    id="geojsonToggle" checked> 临沂市边界 (GeoJSON)</label>
        </div>
        <div class="button" id="spin">旋转定位到北京</div>
    </div>

    <div id="edit-menu">
        <label for="edit-type">地图编辑：</label>
        <select id="edit-type">
            <option value="none">无</option>
            <option value="Point">绘制点</option>
            <option value="LineString">绘制线</option>
            <option value="Polygon">绘制面</option>
            <option value="Circle">绘制圆</option>
            <option value="Modify">修改要素</option>
        </select>
        <button id="deleteEditBtn" style="margin-left: 5px; padding: 2px 6px;">删除要素</button>
        <button id="clearEditBtn" style="margin-left: 5px; padding: 2px 6px;">清空全部</button>
        <button id="exportAllBtn" style="margin-left: 5px; padding: 2px 6px;">导出全部</button>
        <button id="exportSelectedBtn" style="margin-left: 5px; padding: 2px 6px;">导出选中</button>
    </div>
    <div id="menu">
        <label for="type">测量工具：</label>
        <select id="type">
            <option value="none">无 (停止测量)</option>
            <option value="Length">长度 (距离)</option>
            <option value="Area">面积</option>
        </select>
        <button id="clearBtn" style="margin-left: 10px; padding: 2px 6px;">清除测量结果</button>
    </div>

    <!-- 自定义弹窗结构 -->
    <div id="custom-modal-overlay">
        <div class="custom-modal-content">
            <div class="custom-modal-header" id="modal-title">提示</div>
            <div class="custom-modal-body" id="modal-message">消息内容</div>
            <div class="custom-modal-footer">
                <button class="custom-modal-btn custom-modal-btn-cancel" id="modal-cancel-btn">取消</button>
                <button class="custom-modal-btn custom-modal-btn-confirm" id="modal-confirm-btn">确定</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 定义图层 ---
        // OSM 矢量底图 (OpenStreetMap)
        const osmLayer = new ol.layer.Tile({
            source: new ol.source.OSM()
        });


        var baiduResolutions = [];
        for (var i = 0; i < 19; i++) {
            baiduResolutions[i] = Math.pow(2, 18 - i);
        }
        var baiduTileGrid = new ol.tilegrid.TileGrid({
            origin: [0, 0], // 百度地图的瓦片原点是 0, 0
            resolutions: baiduResolutions
        });

        const baiduLayer = new ol.layer.Tile({
            source: new ol.source.TileImage({
                projection: 'EPSG:3857',
                tileGrid: baiduTileGrid,
                tileUrlFunction: function (tileCoord) {
                    if (!tileCoord) return "";
                    var z = tileCoord[0];
                    var x = tileCoord[1];
                    // OpenLayers 的 Y 轴向下递增，而百度地图 Y 轴向上递增，需要进行翻转并且减 1
                    var y = -tileCoord[2] - 1;

                    // 百度坐标系瓦片针对负数要求使用 'M' 前缀替代 '-'
                    var xStr = x < 0 ? 'M' + (-x) : x;
                    var yStr = y < 0 ? 'M' + (-y) : y;

                    // 使用可用的百度地图瓦片接口
                    return 'http://maponline0.bdimg.com/tile/?qt=vtile&x=' + xStr + '&y=' + yStr + '&z=' + z + '&styles=pl';
                }
            }),
            visible: false // 默认隐藏，通过控件切换
        });
        var gaodeMapLayer = new ol.layer.Tile({
            title: "高德地图",
            source: new ol.source.XYZ({
                url: 'http://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&style=6',
            }),
            visible: false // 默认隐藏
        });


        // ESRI 遥感影像底图 (ArcGIS World Imagery)
        const esriImageryLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attributions: 'Tiles &copy; Esri &mdash; Source: Esri'
            }),
            visible: false // 默认隐藏，通过控件切换
        });

        // --- 2. 实例化控件 ---

        // 鼠标位置控件
        const mousePositionControl = new ol.control.MousePosition({
            coordinateFormat: ol.coordinate.createStringXY(4), // 保留4位小数
            projection: 'EPSG:4326', // 显示经纬度
            target: document.getElementById('mouse-position'),
            undefinedHTML: '请将鼠标移入地图'
        });

        // 鹰眼控件
        const overviewMapControl = new ol.control.OverviewMap({
            className: 'ol-overviewmap ol-custom-overviewmap', // 自定义CSS类名
            layers: [
                // 鹰眼中的图层，通常只放一个简单的底图
                new ol.layer.Tile({
                    source: new ol.source.OSM()
                })
            ],
            collapseLabel: '\u00BB', // 折叠图标
            label: '\u00AB',         // 展开图标
            collapsed: false         // 默认展开
        });

        // --- 3. 初始化地图 ---
        const map = new ol.Map({
            target: 'map',
            // 加载默认控件并添加我们的自定义控件
            controls: ol.control.defaults.defaults().extend([
                mousePositionControl,
                overviewMapControl
            ]),
            layers: [osmLayer, esriImageryLayer, baiduLayer, gaodeMapLayer],
            view: new ol.View({
                center: ol.proj.fromLonLat([116.3974, 39.9093]), // 北京中心
                zoom: 10
            })
        });


        // 北京坐标（经纬度）
        var beijing = ol.proj.fromLonLat([116.3974, 39.9093]);

        // --- 数据图层加载 ---
        const kmlLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: '2012_Earthquakes_Mag5.kml',
                format: new ol.format.KML({ extractStyles: true })
            })
        });

        const gpxLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: 'fells_loop.gpx',
                format: new ol.format.GPX()
            }),
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#ff0000',
                    width: 3
                })
            })
        });

        const geojsonLayer = new ol.layer.Vector({
            source: new ol.source.Vector({
                url: '临沂市.geojson',
                format: new ol.format.GeoJSON()
            }),
            style: new ol.style.Style({
                stroke: new ol.style.Stroke({
                    color: '#0000ff',
                    width: 2
                }),
                fill: new ol.style.Fill({
                    color: 'rgba(0, 0, 255, 0.1)'
                })
            })
        });

        map.addLayer(kmlLayer);
        map.addLayer(gpxLayer);
        map.addLayer(geojsonLayer);

        document.getElementById('kmlToggle').addEventListener('change', function (e) {
            kmlLayer.setVisible(e.target.checked);
        });
        document.getElementById('gpxToggle').addEventListener('change', function (e) {
            gpxLayer.setVisible(e.target.checked);
        });
        document.getElementById('geojsonToggle').addEventListener('change', function (e) {
            geojsonLayer.setVisible(e.target.checked);
        });

        // --- 4. 监听图层切换 ---
        document.querySelectorAll('input[name="baseLayer"]').forEach(function (radio) {
            radio.addEventListener('change', function (e) {
                if (e.target.value === 'osm') {
                    spyglassMode = false;
                    osmLayer.setVisible(true);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'imagery') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(true);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'baidu') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(true);
                    gaodeMapLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'gaode') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(true);
                    map.render();
                } else if (e.target.value === 'spyglass') {
                    spyglassMode = true;
                    // 在探照灯模式下：底部渲染矢量，表面渲染影像（被剪裁）
                    osmLayer.setVisible(true);
                    esriImageryLayer.setVisible(true);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    map.render();
                }
            });
        });

        // --- 4.5 监听地图点击事件，显示经纬度弹窗 ---
        map.on('click', function (event) {
            // 如果当前启用了测量绘图工具或地图编辑工具，则不触发坐标弹窗，避免冲突
            if (document.getElementById('type').value !== 'none' ||
                document.getElementById('edit-type').value !== 'none') {
                return;
            }

            // 获取点击位置的像素坐标
            var coordinate = map.getEventCoordinate(event.originalEvent);

            // 将坐标从地图投影（Web Mercator 3857）转换为经纬度（EPSG:4326）
            var lonLat = ol.proj.transform(coordinate, 'EPSG:3857', 'EPSG:4326');

            // 格式化经纬度，保留6位小数
            var longitude = lonLat[0].toFixed(6);
            var latitude = lonLat[1].toFixed(6);

            // 显示弹窗
            showCustomModal('alert', '点击位置坐标', '经度 (Longitude): ' + longitude + '\n纬度 (Latitude): ' + latitude);
        });

        // 地图裁剪效果
        const container = document.getElementById('map');
        var mousePosition = null;
        var radius = 75; // 圆形裁剪半径
        var spyglassMode = false; // 是否开启截取模式

        container.addEventListener('mousemove', function (event) {
            if (!spyglassMode) return;
            mousePosition = map.getEventPixel(event);
            map.render();
        });

        container.addEventListener('mouseout', function () {
            if (!spyglassMode) return;
            mousePosition = null;
            map.render();
        });

        esriImageryLayer.on('prerender', function (event) {
            if (!spyglassMode) return;

            var ctx = event.context;
            var pixelRatio = event.frameState.pixelRatio;
            var width = ctx.canvas.width;
            var height = ctx.canvas.height;

            ctx.save();
            ctx.beginPath();

            // 绘制覆盖整个画布的外层矩形（顺时针方向）
            ctx.moveTo(0, 0);
            ctx.lineTo(width, 0);
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();

            if (mousePosition) {
                // 在鼠标位置绘制内层圆圈（逆时针方向，true 代表逆时针，形成镂空效果）
                var x = mousePosition[0] * pixelRatio;
                var y = mousePosition[1] * pixelRatio;
                var r = radius * pixelRatio;
                ctx.moveTo(x + r, y);
                ctx.arc(x, y, r, 0, 2 * Math.PI, true);
                ctx.closePath();
            }

            // 使用非零环绕规则进行裁剪，保留矩形内部、圆圈外部的区域（即挖空圆）
            ctx.clip();
        });

        // 呈现层后恢复画布的背景，并画探照灯的边框
        esriImageryLayer.on('postrender', function (event) {
            if (!spyglassMode) return;
            var ctx = event.context;
            var pixelRatio = event.frameState.pixelRatio;

            ctx.restore(); // 恢复到 clip 之前的状态

            // 恢复裁剪区域后，再在最顶层绘制探照灯的半透明圆形边框
            if (mousePosition) {
                ctx.save();
                ctx.beginPath();
                var x = mousePosition[0] * pixelRatio;
                var y = mousePosition[1] * pixelRatio;
                var r = radius * pixelRatio;
                ctx.arc(x, y, r, 0, 2 * Math.PI);
                ctx.lineWidth = 5 * pixelRatio;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.stroke();
                ctx.restore();
            }
        });

        // --- 6. 弹性定位到北京按钮事件 ---
        document.getElementById('spin').addEventListener('click', function () {
            // 使用 animate() 方法实现平滑动画过渡
            map.getView().animate({
                center: beijing,           // 目标中心坐标
                zoom: 12,                  // 目标缩放级别
                duration: 1000,            // 动画时长
                easing: ol.easing.elastic   // 弹性缓动效果
            });
        });
        var sketch;
        /**
         * 帮助提示框对象（The help tooltip element.）
         * @type {Element}
         */
        var helpTooltipElement;
        /**
         *帮助提示框显示的信息（Overlay to show the help messages.）
         * @type {ol.Overlay}
         */
        var helpTooltip;
        /**
         * 测量工具提示框对象（The measure tooltip element. ）
         * @type {Element}
         */
        var measureTooltipElement;
        /**
         *测量工具中显示的测量值（Overlay to show the measurement.）
         * @type {ol.Overlay}
         */
        var measureTooltip;
        /**
         *  当用户正在绘制多边形时的提示信息文本
         * @type {string}
         */
        var continuePolygonMsg = '单击继续绘制，右键结束';
        /**
         * 当用户正在绘制线时的提示信息文本
         * @type {string}
         */
        var continueLineMsg = '单击继续绘制，右键结束';

        // --- 7. 添加测量功能 ---
        // 用于绘制图形的矢量图层
        var source = new ol.source.Vector();
        var vector = new ol.layer.Vector({
            source: source,
            style: new ol.style.Style({
                fill: new ol.style.Fill({
                    color: 'rgba(255, 255, 255, 0.2)'
                }),
                stroke: new ol.style.Stroke({
                    color: '#ffcc33',
                    width: 2
                }),
                image: new ol.style.Circle({
                    radius: 7,
                    fill: new ol.style.Fill({
                        color: '#ffcc33'
                    })
                })
            })
        });
        map.addLayer(vector);

        // 鼠标移动事件处理，用于更新提示框的位置和内容
        var pointerMoveHandler = function (evt) {
            if (evt.dragging) {
                return;
            }
            var helpMsg = '单击地图起点开始测量';

            if (sketch) {
                var geom = sketch.getGeometry();
                if (geom instanceof ol.geom.Polygon) {
                    helpMsg = continuePolygonMsg;
                } else if (geom instanceof ol.geom.LineString) {
                    helpMsg = continueLineMsg;
                }
            }

            helpTooltipElement.innerHTML = helpMsg;
            helpTooltip.setPosition(evt.coordinate);
            helpTooltipElement.classList.remove('hidden');
        };

        map.on('pointermove', pointerMoveHandler);
        map.getViewport().addEventListener('mouseout', function () {
            helpTooltipElement.classList.add('hidden');
        });

        // 格式化长度
        var formatLength = function (line) {
            var length = ol.sphere.getLength(line);
            var output;
            if (length > 100) {
                output = (Math.round(length / 1000 * 100) / 100) + ' ' + 'km';
            } else {
                output = (Math.round(length * 100) / 100) + ' ' + 'm';
            }
            return output;
        };

        // 格式化面积
        var formatArea = function (polygon) {
            var area = ol.sphere.getArea(polygon);
            var output;
            if (area > 10000) {
                output = (Math.round(area / 1000000 * 100) / 100) + ' ' + 'km<sup>2</sup>';
            } else {
                output = (Math.round(area * 100) / 100) + ' ' + 'm<sup>2</sup>';
            }
            return output;
        };

        // 创建帮助信息提示框
        function createHelpTooltip() {
            if (helpTooltipElement) {
                helpTooltipElement.parentNode.removeChild(helpTooltipElement);
            }
            helpTooltipElement = document.createElement('div');
            helpTooltipElement.className = 'tooltip hidden';
            helpTooltip = new ol.Overlay({
                element: helpTooltipElement,
                offset: [15, 0],
                positioning: 'center-left'
            });
            map.addOverlay(helpTooltip);
        }

        // 创建测量工具提示框
        function createMeasureTooltip() {
            if (measureTooltipElement) {
                measureTooltipElement.parentNode.removeChild(measureTooltipElement);
            }
            measureTooltipElement = document.createElement('div');
            measureTooltipElement.className = 'tooltip tooltip-measure';
            measureTooltip = new ol.Overlay({
                element: measureTooltipElement,
                offset: [0, -15],
                positioning: 'bottom-center',
                stopEvent: false,
                insertFirst: false
            });
            map.addOverlay(measureTooltip);
        }

        var typeSelect = document.getElementById('type');
        var draw; // global so we can remove it later

        function addInteraction() {
            var value = typeSelect.value;
            if (value === 'none') {
                return;
            }
            var type = (value === 'Area' ? 'Polygon' : 'LineString');
            draw = new ol.interaction.Draw({
                source: source,
                type: type,
                style: new ol.style.Style({
                    fill: new ol.style.Fill({
                        color: 'rgba(255, 255, 255, 0.2)'
                    }),
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.5)',
                        lineDash: [10, 10],
                        width: 2
                    }),
                    image: new ol.style.Circle({
                        radius: 5,
                        stroke: new ol.style.Stroke({
                            color: 'rgba(0, 0, 0, 0.7)'
                        }),
                        fill: new ol.style.Fill({
                            color: 'rgba(255, 255, 255, 0.2)'
                        })
                    })
                })
            });
            map.addInteraction(draw);

            createMeasureTooltip();
            createHelpTooltip();

            var listener;

            // 为交互式图形绘制控件对象绑定 drawstart 事件
            draw.on('drawstart',
                function (evt) {
                    sketch = evt.feature; // 绘图要素
                    var tooltipCoord = evt.coordinate; // 绘制的坐标

                    // 绑定 change 事件, 根据绘制几何图形类型得到测量的距离或面积, 并将其显示
                    listener = sketch.getGeometry().on('change', function (evt) {
                        var geom = evt.target; // 绘制的几何图形
                        var output;
                        if (geom instanceof ol.geom.Polygon) {
                            // 输出面积值
                            output = formatArea(/** @type {ol.geom.Polygon} */(geom));
                            tooltipCoord = geom.getInteriorPoint().getCoordinates(); // 坐标
                        } else if (geom instanceof ol.geom.LineString) {
                            // 输出距离值
                            output = formatLength(/** @type {ol.geom.LineString} */(geom));
                            tooltipCoord = geom.getLastCoordinate(); // 坐标
                        }
                        // 将测量值添加到测量工具提示框中显示
                        measureTooltipElement.innerHTML = output;
                        // 设置测量工具提示框的显示位置
                        measureTooltip.setPosition(tooltipCoord);
                    });
                }, this);

            // 为交互式图形绘制控件对象绑定 drawend 事件
            draw.on('drawend',
                function (evt) {
                    // 设置测量工具提示框的样式
                    measureTooltipElement.className = 'tooltip tooltip-static';
                    measureTooltip.setOffset([0, -7]);
                    sketch = null; // 置空当前绘图要素对象
                    measureTooltipElement = null; // 置空测量工具提示框对象
                    createMeasureTooltip(); // 重新创建一个测量工具提示框来显示结果
                    ol.Observable.unByKey(listener);
                }, this);
        }

        // 当发生选框改变时重新添加绘制交互
        typeSelect.onchange = function () {
            map.removeInteraction(draw);
            // 切换工具时隐藏悬浮提示框
            if (helpTooltipElement) {
                helpTooltipElement.classList.add('hidden');
            }
            addInteraction();
        };

        // 清除按钮功能：清空矢量层并移除之前绘制的所有测量提示框
        document.getElementById('clearBtn').addEventListener('click', function () {
            source.clear(); // 清空绘制的线和面

            // 找到所有固定的结果提示框并删除
            var staticTooltips = document.querySelectorAll('.tooltip-static');
            staticTooltips.forEach(function (tooltip) {
                tooltip.parentNode.removeChild(tooltip);
            });

            // 如果有正在测量悬空的未结束标签，也清空内部文字
            if (measureTooltipElement) {
                measureTooltipElement.innerHTML = '';
            }
        });

        // --- 8. 添加地图编辑功能 ---
        var editSource = new ol.source.Vector();
        var editLayer = new ol.layer.Vector({
            source: editSource,
            style: new ol.style.Style({
                fill: new ol.style.Fill({
                    color: 'rgba(255, 0, 0, 0.2)'
                }),
                stroke: new ol.style.Stroke({
                    color: '#ff0000',
                    width: 2
                }),
                image: new ol.style.Circle({
                    radius: 7,
                    fill: new ol.style.Fill({
                        color: '#ff0000'
                    })
                })
            })
        });
        map.addLayer(editLayer);

        var editTypeSelect = document.getElementById('edit-type');
        var drawEdit, modifyEdit, snapEdit, selectEdit;

        // 初始化选择要素交互，用于删除单个要素
        selectEdit = new ol.interaction.Select({
            layers: [editLayer]
        });
        map.addInteraction(selectEdit);

        function addEditInteraction() {
            var value = editTypeSelect.value;
            if (value === 'none') return;

            if (value === 'Modify') {
                modifyEdit = new ol.interaction.Modify({ source: editSource });
                map.addInteraction(modifyEdit);
            } else {
                drawEdit = new ol.interaction.Draw({
                    source: editSource,
                    type: value
                });
                map.addInteraction(drawEdit);
            }

            // 添加吸附交互，使编辑更精准
            snapEdit = new ol.interaction.Snap({ source: editSource });
            map.addInteraction(snapEdit);
        }

        // Ctrl+Z 撤回上一个点
        window.addEventListener('keydown', function (event) {
            // 支持 Ctrl+Z 或 Cmd+Z (Mac)
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
                var handled = false;
                // 优先撤回地图编辑中的点
                if (drawEdit) {
                    drawEdit.removeLastPoint();
                    handled = true;
                }
                // 如果编辑工具没在绘图，尝试撤回测量工具的点
                if (!handled && draw) {
                    draw.removeLastPoint();
                    handled = true;
                }

                if (handled) {
                    event.preventDefault(); // 阻止浏览器默认撤销行为
                }
            }
        });

        // 删除选中的单个要素按钮
        document.getElementById('deleteEditBtn').onclick = function () {
            var selectedFeatures = selectEdit.getFeatures();
            if (selectedFeatures.getLength() > 0) {
                showCustomModal('confirm', '确认删除', '确定要删除选中的要素吗？', function() {
                    selectedFeatures.forEach(function (feature) {
                        editSource.removeFeature(feature);
                    });
                    selectedFeatures.clear(); // 清空选择集
                });
            } else {
                showCustomModal('alert', '提示', '请先使用鼠标，选择图层编辑后，再点击选中一个红色的图形，最后点击删除');
            }
        };

        // 监听编辑菜单切换
        editTypeSelect.onchange = function () {
            // 切换编辑工具前，先停下测量工具
            typeSelect.value = 'none';
            map.removeInteraction(draw);
            if (helpTooltipElement) helpTooltipElement.classList.add('hidden');


            map.removeInteraction(drawEdit);
            map.removeInteraction(modifyEdit);
            map.removeInteraction(snapEdit);

            // 如果选择了绘图模式，暂时停用选择器，避免点击干扰
            if (editTypeSelect.value !== 'none' && editTypeSelect.value !== 'Modify') {
                selectEdit.setActive(false);
            } else {
                selectEdit.setActive(true);
            }

            addEditInteraction();
        };

        // 修改测量菜单切换逻辑：切换测量时停下编辑工具
        var originalMeasurementChange = typeSelect.onchange;
        typeSelect.onchange = function () {
            // 停下编辑工具
            editTypeSelect.value = 'none';
            map.removeInteraction(drawEdit);
            map.removeInteraction(modifyEdit);
            map.removeInteraction(snapEdit);
            selectEdit.setActive(false);

            // 执行原有的测量逻辑
            originalMeasurementChange.call(this);
        };

        // 清空绘图按钮
        document.getElementById('clearEditBtn').onclick = function () {
            showCustomModal('confirm', '确认清空', '确定要删除所有的图形吗？', function() {
                editSource.clear();
                selectEdit.getFeatures().clear();
            });
        };
        
        /**
         * 显示自定义弹窗
         * @param {string} type 'alert' | 'confirm'
         * @param {string} title 
         * @param {string} message 
         * @param {function} onConfirm 
         */
        function showCustomModal(type, title, message, onConfirm) {
            const overlay = document.getElementById('custom-modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            titleEl.textContent = title;
            messageEl.textContent = message;
            
            if (type === 'alert') {
                cancelBtn.style.display = 'none';
            } else {
                cancelBtn.style.display = 'block';
            }

            const hideModal = () => {
                overlay.classList.remove('show');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);
            };

            const handleConfirm = () => {
                hideModal();
                if (onConfirm) onConfirm();
                cleanup();
            };

            const handleCancel = () => {
                hideModal();
                cleanup();
            };

            const cleanup = () => {
                confirmBtn.removeEventListener('click', handleConfirm);
                cancelBtn.removeEventListener('click', handleCancel);
            };

            confirmBtn.addEventListener('click', handleConfirm);
            cancelBtn.addEventListener('click', handleCancel);

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.add('show');
            }, 10);
        }


        //导出要素为 GeoJSON 并下载

        function downloadGeoJSON(features, filename) {
            if (features.length === 0) {
                showCustomModal('alert', '提示', '没有可导出的数据！');
                return;
            }
            var format = new ol.format.GeoJSON();
            var geojsonStr = format.writeFeatures(features, {
                dataProjection: 'EPSG:4326',
                featureProjection: 'EPSG:3857'
            });
            var blob = new Blob([geojsonStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导出全部按钮
        document.getElementById('exportAllBtn').onclick = function () {
            var features = editSource.getFeatures();
            downloadGeoJSON(features, 'features_all.geojson');
        };

        // 导出选中按钮
        document.getElementById('exportSelectedBtn').onclick = function () {
            var features = selectEdit.getFeatures().getArray();
            if (features.length === 0) {
                showCustomModal('alert', '提示', '请先选中要导出的要素！');
                return;
            }
            downloadGeoJSON(features, 'features_selected.geojson');
        };





    </script>
</body>

</html>
