<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers 整合</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css" type="text/css">
    <link rel="stylesheet" href="cards.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="weatherWidget.css" type="text/css">
    <script src="weatherWidget.js"></script>

    <style>
        #mapCon {
            width: 100%;
            height: 95%;
            position: absolute;
        }

        /*测量菜单的样式信息*/
        #menu {
            float: left;
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 4px;
        }

        .marker {
            width: 24px;
            height: 24px;
            background-image: url('地址.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            cursor: pointer;
        }

        .address {
            position: relative;
            top: -40px;
            left: -50%;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Microsoft YaHei', sans-serif;
            padding: 4px 10px;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
            white-space: nowrap;
            pointer-events: none;
        }

        .address::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid rgba(255, 255, 255, 0.95);
        }

        /**
        * 编辑菜单的样式信息
        */
        #edit-menu {
            position: absolute;
            bottom: 60px;
            left: 15px;
            z-index: 2000;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 4px;
        }

        .checkbox {
            left: 20px;
        }

        /**
        * 提示框的样式信息
        */
        .tooltip {
            position: relative;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            color: white;
            padding: 4px 8px;
            opacity: 0.7;
            white-space: nowrap;
        }

        .tooltip-measure {
            opacity: 1;
            font-weight: bold;
        }

        .tooltip-static {
            background-color: #ffcc33;
            color: black;
            border: 1px solid white;
        }

        .tooltip-measure:before,
        .tooltip-static:before {
            border-top: 6px solid rgba(0, 0, 0, 0.5);
            border-right: 6px solid transparent;
            border-left: 6px solid transparent;
            content: "";
            position: absolute;
            bottom: -6px;
            margin-left: -7px;
            left: 50%;
        }

        .tooltip-static:before {
            border-top-color: #ffcc33;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        /* 1. 地图容器 */
        #map {
            width: 100%;
            height: 100vh;
            /* 全屏显示 */
            position: relative;
            background-color: #f8f8f8;
        }

        /* 2. 坐标显示控件自定义样式 */
        .custom-mouse-position {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            color: #333;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* 3. 鹰眼控件自定义样式 */
        /* 将其定位在右上角 */
        .ol-overviewmap {
            top: 10px;
            right: 10px;
            bottom: auto;
            left: auto;
        }

        /* 鹰眼内部地图窗口的样式 */
        .ol-overviewmap .ol-overviewmap-map {
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            height: 150px;
            width: 200px;
        }

        /* 鹰眼中表示当前视口的矩形框样式 */
        .ol-overviewmap .ol-overviewmap-box {
            border: 2px solid #ff4500;
            background-color: rgba(255, 69, 0, 0.1);
        }

        /* 覆盖 OpenLayers 默认按钮样式，使其更协调 */
        .ol-overviewmap button {
            background-color: #007bff;
            cursor: pointer;
        }

        /* 弹性定位按钮样式 */
        .button {
            position: absolute;
            top: 15px;
            right: 250px;
            /* 从 60px 改为 250px，避开右上角的鹰眼地图 */
            z-index: 1000;
            background-color: #28a745;
            color: white;
            padding: 10px 16px;
            border: none;
            border-radius: 5px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: #218838;
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
        }

        .button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        /* 自定义弹窗样式 */
        #custom-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #custom-modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .custom-modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 380px;
            max-width: 90%;
            transform: scale(0.8);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        #custom-modal-overlay.show .custom-modal-content {
            transform: scale(1);
        }

        .custom-modal-header {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .custom-modal-body {
            font-size: 15px;
            color: #4a4a4a;
            line-height: 1.6;
            margin-bottom: 24px;
            white-space: pre-wrap;
        }

        .custom-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .custom-modal-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .custom-modal-btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .custom-modal-btn-cancel:hover {
            background: #e8e8e8;
        }

        .custom-modal-btn-confirm {
            background: #28a745;
            color: white;
        }

        .custom-modal-btn-confirm:hover {
            background: #218838;
        }

        /* Popup 弹窗样式 */
        .ol-popup {
            position: absolute;
            background: white;
            border-radius: 12px;
            padding: 0;
            min-width: 280px;
            max-width: 340px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            animation: popupFadeIn 0.25s ease;
            overflow: hidden;
        }

        @keyframes popupFadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ol-popup::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid white;
        }

        .popup-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
        }

        .popup-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .popup-close:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .popup-body {
            padding: 14px 18px;
        }

        .popup-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin-bottom: 10px;
        }

        .popup-info-row {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .popup-info-row span.label {
            color: #999;
            flex-shrink: 0;
        }

        .popup-desc {
            font-size: 13px;
            color: #444;
            line-height: 1.7;
            margin-top: 10px;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
        }

        .popup-img-container {
            width: 100%;
            height: 140px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            display: none;
            /* hidden by default */
        }

        .popup-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* 搜索框下拉列表项样式 */
        .search-result-item {
            padding: 8px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #333;
        }

        .search-result-item:hover {
            background-color: #f0f0f0;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

    </style>
</head>

<body>

    <div id="map">
        <div id="mouse-position" class="custom-mouse-position"></div>
        <div id="layer-switcher"
            style="position: absolute; top: 15px; left: 50px; z-index: 1000; background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: sans-serif; font-size: 14px;">
            <label style="cursor:pointer;"><input type="radio" name="baseLayer" value="osm" checked> 默认：矢量图层
                (OSM)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="imagery"> 默认：遥感影像 (ESRI)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="baidu"> 百度地图 (Baidu)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="gaode"> 高德地图 (Gaode)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="tianditu"> 天地图 (WMTS)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="wms"> WMS 示例 (States)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="radio" name="baseLayer"
                    value="spyglass"> 裁剪：探照灯模式</label>
            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #ccc;">
            <label style="cursor:pointer; display:inline-block;"><input type="checkbox" id="kmlToggle" checked> 2012地震数据
                (KML)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="checkbox" id="gpxToggle"
                    checked> GPS轨迹 (GPX)</label><br>
            <label style="cursor:pointer; margin-top:5px; display:inline-block;"><input type="checkbox"
                    id="geojsonToggle" checked> 临沂市边界 (GeoJSON)</label>
            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #ccc;">
            <label
                style="cursor:pointer; font-weight: bold; color: #d35400; display: flex; align-items: center; gap: 4px;">
                <input type="checkbox" id="heatmapToggle" checked> 🔥 震源热点图
            </label>
            <div id="heatmap-settings" style="padding-left: 20px; margin-top: 8px;">
                <div
                    style="font-size: 12px; color: #666; display: flex; justify-content: space-between; margin-bottom: 2px;">
                    <span>半径:</span><span id="radius-val" style="color: #667eea; font-weight: bold;">10</span>
                </div>
                <input type="range" id="heatmap-radius" min="1" max="50" step="1" value="10"
                    style="width: 100%; height: 4px; accent-color: #667eea; cursor: pointer;">
                <div
                    style="font-size: 12px; color: #666; display: flex; justify-content: space-between; margin-top: 8px; margin-bottom: 2px;">
                    <span>模糊:</span><span id="blur-val" style="color: #667eea; font-weight: bold;">15</span>
                </div>
                <input type="range" id="heatmap-blur" min="1" max="50" step="1" value="15"
                    style="width: 100%; height: 4px; accent-color: #667eea; cursor: pointer;">
            </div>
        </div>

        <!-- 搜索框容器 -->
        <div id="search-container"
            style="position: absolute; top: 15px; left: 350px; z-index: 1000; display: flex; flex-direction: column;">
            <div
                style="background: rgba(255, 255, 255, 0.9); padding: 5px 10px; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 8px;">
                <input type="text" id="searchInput" autocomplete="off" placeholder="搜索景点或地区..."
                    style="padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px;font-size: 14px; width: 220px; outline: none;">
            </div>
            <!-- 下拉框 -->
            <ul id="searchResults"
                style="display: none; background: white; margin: 5px 0 0 0; border-radius: 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); list-style: none; padding: 0; max-height: 250px; overflow-y: auto;">
            </ul>
        </div>
        <div id="mapCon">
        </div>
        <div class="button" id="spin">旋转定位到北京</div>
        <div class="button" id="toggleMarkersBtn" style="right: 400px; background-color: #007bff;">隐藏标注</div>
        <div class="button" id="addFeatures" style="right: 510px; background-color: #17a2b8;">添加聚合</div>
        <div class="button" id="removeFeatures" style="right: 620px; background-color: #dc3545;">移除聚合</div>



    </div>

    <!-- 静态标注用的 Overlay 容器 -->
    <div id="marker" class="marker"></div>
    <div id="address" class="address"></div>

    <div id="edit-menu">
        <label for="edit-type">地图编辑：</label>
        <select id="edit-type">
            <option value="none">无</option>
            <option value="Point">绘制点</option>
            <option value="LineString">绘制线</option>
            <option value="Polygon">绘制面</option>
            <option value="Circle">绘制圆</option>
            <option value="Modify">修改要素</option>
        </select>
        <button id="deleteEditBtn" style="margin-left: 5px; padding: 2px 6px;">删除要素</button>
        <button id="clearEditBtn" style="margin-left: 5px; padding: 2px 6px;">清空全部</button>
        <button id="exportAllBtn" style="margin-left: 5px; padding: 2px 6px;">导出全部</button>
        <button id="exportSelectedBtn" style="margin-left: 5px; padding: 2px 6px;">导出选中</button>
    </div>
    <div id="menu">
        <label for="type">测量工具：</label>
        <select id="type">
            <option value="none">无 (停止测量)</option>
            <option value="Length">长度 (距离)</option>
            <option value="Area">面积</option>
        </select>
        <button id="clearBtn" style="margin-left: 10px; padding: 2px 6px;">清除测量结果</button>
    </div>

    <!-- Popup 弹窗容器 -->
    <div id="popup" class="ol-popup">
        <div class="popup-header">
            <h3 id="popup-title"></h3>
            <button class="popup-close" id="popup-closer">×</button>
        </div>
        <div class="popup-body">
            <div class="popup-img-container" id="popup-img-container">
                <img id="popup-image" src="" alt="景点图片">
            </div>
            <span class="popup-tag" id="popup-category"></span>
            <div class="popup-info-row"><span class="label">📍 地址：</span><span id="popup-address"></span></div>
            <div class="popup-info-row" id="popup-population-row"><span class="label">👥 人口：</span><span
                    id="popup-population"></span></div>
            <div class="popup-desc" id="popup-desc"></div>
        </div>
    </div>

    <!-- 自定义弹窗结构 -->
    <div id="custom-modal-overlay">
        <div class="custom-modal-content">
            <div class="custom-modal-header" id="modal-title">提示</div>
            <div class="custom-modal-body" id="modal-message">消息内容</div>
            <div class="custom-modal-footer">
                <button class="custom-modal-btn custom-modal-btn-cancel" id="modal-cancel-btn">取消</button>
                <button class="custom-modal-btn custom-modal-btn-confirm" id="modal-confirm-btn">确定</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 定义图层 ---
        // OSM 矢量底图 (OpenStreetMap)
        const osmLayer = new ol.layer.Tile({
            source: new ol.source.OSM()
        });


        var baiduResolutions = [];
        for (var i = 0; i < 19; i++) {
            baiduResolutions[i] = Math.pow(2, 18 - i);
        }
        var baiduTileGrid = new ol.tilegrid.TileGrid({
            origin: [0, 0], // 百度地图的瓦片原点是 0, 0
            resolutions: baiduResolutions
        });

        const baiduLayer = new ol.layer.Tile({
            source: new ol.source.TileImage({
                projection: 'EPSG:3857',
                tileGrid: baiduTileGrid,
                tileUrlFunction: function (tileCoord) {
                    if (!tileCoord) return "";
                    var z = tileCoord[0];
                    var x = tileCoord[1];
                    // OpenLayers 的 Y 轴向下递增，而百度地图 Y 轴向上递增，需要进行翻转并且减 1
                    var y = -tileCoord[2] - 1;

                    // 百度坐标系瓦片针对负数要求使用 'M' 前缀替代 '-'
                    var xStr = x < 0 ? 'M' + (-x) : x;
                    var yStr = y < 0 ? 'M' + (-y) : y;

                    // 使用可用的百度地图瓦片接口
                    return 'http://maponline0.bdimg.com/tile/?qt=vtile&x=' + xStr + '&y=' + yStr + '&z=' + z + '&styles=pl';
                }
            }),
            visible: false // 默认隐藏，通过控件切换
        });
        var gaodeMapLayer = new ol.layer.Tile({
            title: "高德地图",
            source: new ol.source.XYZ({
                url: 'http://wprd01.is.autonavi.com/appmaptile?x={x}&y={y}&z={z}&style=6',
            }),
            visible: false // 默认隐藏
        });

        // --- WMTS 图层 (天地图示例) ---
        var projection = ol.proj.get('EPSG:4326');
        var projectionExtent = projection.getExtent();
        var size = ol.extent.getWidth(projectionExtent) / 256;
        var resolutions = new Array(19);
        var matrixIds = new Array(19);
        for (var z = 0; z < 19; ++z) {
            resolutions[z] = size / Math.pow(2, z);
            matrixIds[z] = z;
        }

        const tiandituKey = '2fef1878e03f9409dd209da184a774fb'; // 请在此处替换您的天地图密钥
        const tiandituLayer = new ol.layer.Group({
            layers: [
                new ol.layer.Tile({
                    source: new ol.source.WMTS({
                        url: 'http://t0.tianditu.gov.cn/vec_c/wmts?tk=' + tiandituKey,
                        layer: 'vec',
                        matrixSet: 'c',
                        format: 'tiles',
                        projection: projection,
                        tileGrid: new ol.tilegrid.WMTS({
                            origin: ol.extent.getTopLeft(projectionExtent),
                            resolutions: resolutions,
                            matrixIds: matrixIds
                        }),
                        style: 'default',
                        wrapX: true
                    })
                }),
                new ol.layer.Tile({
                    source: new ol.source.WMTS({
                        url: 'http://t0.tianditu.gov.cn/cva_c/wmts?tk=' + tiandituKey,
                        layer: 'cva',
                        matrixSet: 'c',
                        format: 'tiles',
                        projection: projection,
                        tileGrid: new ol.tilegrid.WMTS({
                            origin: ol.extent.getTopLeft(projectionExtent),
                            resolutions: resolutions,
                            matrixIds: matrixIds
                        }),
                        style: 'default',
                        wrapX: true
                    })
                })
            ],
            visible: false
        });

        // --- WMS 图层 (GeoServer 示例) ---
        const wmsLayer = new ol.layer.Tile({
            source: new ol.source.TileWMS({
                url: 'https://ahocevar.com/geoserver/wms',
                params: { 'LAYERS': 'topp:states', 'TILED': true },
                serverType: 'geoserver',
            }),
            visible: false
        });


        // ESRI 遥感影像底图 (ArcGIS World Imagery)
        const esriImageryLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
                attributions: 'Tiles &copy; Esri &mdash; Source: Esri'
            }),
            visible: false // 默认隐藏，通过控件切换
        });

        // --- 2. 实例化控件 ---

        // 鼠标位置控件
        const mousePositionControl = new ol.control.MousePosition({
            coordinateFormat: ol.coordinate.createStringXY(4), // 保留4位小数

        const map = new ol.Map({

            controls: ol.control.defaults.defaults().extend([

        // --- 数据图层加载 ---
        const earthquakeSource = new ol.source.Vector({

        // --- 热点图图层 ---

        const heatmapLayer = new ol.layer.Heatmap({
            source: earthquakeSource,

            radius: 10,
            weight: function (feature) {
                // 根据地震震级（magnitude）设置权重
                var name = feature.get('name');
                if (name && name.startsWith('M ')) {
                    var magnitude = parseFloat(name.substr(2));
                    return magnitude - 5; // 震级在 5-9 之间，映射到 0-4

        const gpxLayer = new ol.layer.Vector({

        map.addLayer(kmlLayer);
        map.addLayer(heatmapLayer);
        map.addLayer(gpxLayer);

        document.getElementById('kmlToggle').addEventListener('change', function (e) {

        // 绑定热点图参数项的 input 事件
        const radiusInput = document.getElementById('heatmap-radius');
        const blurInput = document.getElementById('heatmap-blur');
        const radiusVal = document.getElementById('radius-val');
        const blurVal = document.getElementById('blur-val');

        radiusInput.addEventListener('input', function () {
            const radius = parseInt(radiusInput.value, 10);
            radiusVal.innerText = radius;
            heatmapLayer.setRadius(radius);
        });

        blurInput.addEventListener('input', function () {
            const blur = parseInt(blurInput.value, 10);
            blurVal.innerText = blur;
            heatmapLayer.setBlur(blur);
        });
        document.getElementById('gpxToggle').addEventListener('change', function (e) {
            gpxLayer.setVisible(e.target.checked);
        });
        document.getElementById('geojsonToggle').addEventListener('change', function (e) {
            geojsonLayer.setVisible(e.target.checked);
        });

        // --- 5. 初始化天气预报组件 (通过 weatherWidget.js) ---
        const weatherSystem = new WeatherSystem({
            amapKey: '5238a5ca7d94bf31d6868f0fad2a0202',
            qweatherKey: '8c07f5ef1f4345e499e11028d7676bfc',
            qweatherHost: 'jq6r7262hd.re.qweatherapi.com',
            defaultAdcode: '110000',
            onError: function(err) {
                showCustomModal('alert', '天气组件提示', err);
            }
        });

        // --- 4. 监听图层切换 ---
        document.querySelectorAll('input[name="baseLayer"]').forEach(function (radio) {
            radio.addEventListener('change', function (e) {
                if (e.target.value === 'osm') {
                    spyglassMode = false;
                    osmLayer.setVisible(true);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'imagery') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(true);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'baidu') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(true);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'gaode') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(true);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'tianditu') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(true);
                    wmsLayer.setVisible(false);
                    map.render();
                } else if (e.target.value === 'wms') {
                    spyglassMode = false;
                    osmLayer.setVisible(false);
                    esriImageryLayer.setVisible(false);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(true);
                    map.render();
                } else if (e.target.value === 'spyglass') {
                    spyglassMode = true;
                    // 在探照灯模式下：底部渲染矢量，表面渲染影像（被剪裁）
                    osmLayer.setVisible(true);
                    esriImageryLayer.setVisible(true);
                    baiduLayer.setVisible(false);
                    gaodeMapLayer.setVisible(false);
                    tiandituLayer.setVisible(false);
                    wmsLayer.setVisible(false);
                    map.render();
                }
            });
        });

        // --- 4.5 监听地图点击事件，显示经纬度弹窗 ---
        map.on('click', function (event) {
            // 如果当前启用了测量绘图工具或地图编辑工具，则不触发坐标弹窗，避免冲突
            if (document.getElementById('type').value !== 'none' ||
                document.getElementById('edit-type').value !== 'none') {
                return;
            }

            // 如果点击到了标注点要素，由 popup 处理，不显示坐标弹窗
            var hasFeature = map.forEachFeatureAtPixel(event.pixel, function () { return true; });
            if (hasFeature) return;

            // 获取点击位置的像素坐标
            var coordinate = map.getEventCoordinate(event.originalEvent);

            // 将坐标从地图投影（Web Mercator 3857）转换为经纬度（EPSG:4326）
            var lonLat = ol.proj.transform(coordinate, 'EPSG:3857', 'EPSG:4326');

            // 格式化经纬度，保留6位小数
            var longitude = lonLat[0].toFixed(6);
            var latitude = lonLat[1].toFixed(6);

            // 显示二次确认弹窗
            showCustomModal(
                'confirm', 
                '经纬度坐标与天气查询', 
                '经度 (Longitude): ' + longitude + '\n纬度 (Latitude): ' + latitude + '\n\n是否获取该位置的 24 小时天气预报？\n（注：查询将消耗一次和风天气 API 额度）', 
                function() {
                    weatherSystem.queryByLocation(longitude, latitude);
                }
            );
        });

        // 地图裁剪效果
        const container = document.getElementById('map');
        var mousePosition = null;
        var radius = 75; // 圆形裁剪半径
        var spyglassMode = false; // 是否开启截取模式

        container.addEventListener('mousemove', function (event) {
            if (!spyglassMode) return;
            mousePosition = map.getEventPixel(event);
            map.render();
        });

        container.addEventListener('mouseout', function () {
            if (!spyglassMode) return;
            mousePosition = null;
            map.render();
        });

        esriImageryLayer.on('prerender', function (event) {
            if (!spyglassMode) return;

            var ctx = event.context;
            var pixelRatio = event.frameState.pixelRatio;
            var width = ctx.canvas.width;
            var height = ctx.canvas.height;

            ctx.save();
            ctx.beginPath();

            // 绘制覆盖整个画布的外层矩形（顺时针方向）
            ctx.moveTo(0, 0);
            ctx.lineTo(width, 0);
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();

            if (mousePosition) {
                // 在鼠标位置绘制内层圆圈（逆时针方向，true 代表逆时针，形成镂空效果）
                var x = mousePosition[0] * pixelRatio;
                var y = mousePosition[1] * pixelRatio;
                var r = radius * pixelRatio;
                ctx.moveTo(x + r, y);
                ctx.arc(x, y, r, 0, 2 * Math.PI, true);
                ctx.closePath();
            }

            // 使用非零环绕规则进行裁剪，保留矩形内部、圆圈外部的区域（即挖空圆）
            ctx.clip();
        });

        // 呈现层后恢复画布的背景，并画探照灯的边框
        esriImageryLayer.on('postrender', function (event) {
            if (!spyglassMode) return;
            var ctx = event.context;
            var pixelRatio = event.frameState.pixelRatio;

            ctx.restore(); // 恢复到 clip 之前的状态

            // 恢复裁剪区域后，再在最顶层绘制探照灯的半透明圆形边框
            if (mousePosition) {
                ctx.save();
                ctx.beginPath();
                var x = mousePosition[0] * pixelRatio;
                var y = mousePosition[1] * pixelRatio;
                var r = radius * pixelRatio;
                ctx.arc(x, y, r, 0, 2 * Math.PI);
                ctx.lineWidth = 5 * pixelRatio;
                ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                ctx.stroke();
                ctx.restore();
            }
        });

        // --- 6. 弹性定位到北京按钮事件 ---
        document.getElementById('spin').addEventListener('click', function () {
            // 使用 animate() 方法实现平滑动画过渡
            map.getView().animate({
                center: beijing,             // 目标中心坐标
                zoom: 12,                  // 目标缩放级别
                duration: 1000,            // 动画时长
                easing: ol.easing.elastic   // 弹性缓动效果
            });
        });

        // --- 隐藏/展示标注按钮事件 ---
        var markersVisible = true;
        document.getElementById('toggleMarkersBtn').addEventListener('click', function () {
            markersVisible = !markersVisible;
            if (typeof markerLayer !== 'undefined') {
                markerLayer.setVisible(markersVisible);
            }
            this.textContent = markersVisible ? "隐藏标注" : "展示标注";
            this.style.backgroundColor = markersVisible ? "#6c757d" : "#007bff";

            // 如果隐藏标注，同时关闭弹窗
            if (!markersVisible && typeof popupOverlay !== 'undefined') {
                popupOverlay.setPosition(undefined);
            }
        });

        var sketch;
        /**
         * 帮助提示框对象（The help tooltip element.）
         * @type {Element}
         */
        var helpTooltipElement;
        /**
         *帮助提示框显示的信息（Overlay to show the help messages.）
         * @type {ol.Overlay}
         */
        var helpTooltip;
        /**
         * 测量工具提示框对象（The measure tooltip element. ）
         * @type {Element}
         */
        var measureTooltipElement;
        /**
         *测量工具中显示的测量值（Overlay to show the measurement.）
         * @type {ol.Overlay}
         */
        var measureTooltip;
        /**
         *  当用户正在绘制多边形时的提示信息文本
         * @type {string}
         */
        var continuePolygonMsg = '单击继续绘制，右键结束';
        /**
         * 当用户正在绘制线时的提示信息文本
         * @type {string}
         */
        var continueLineMsg = '单击继续绘制，右键结束';

        // --- 7. 添加测量功能 ---
        // 用于绘制图形的矢量图层
        var source = new ol.source.Vector();
        var vector = new ol.layer.Vector({
            source: source,
            style: new ol.style.Style({
                fill: new ol.style.Fill({
                    color: 'rgba(255, 255, 255, 0.2)'
                }),
                stroke: new ol.style.Stroke({
                    color: '#ffcc33',
                    width: 2
                }),
                image: new ol.style.Circle({
                    radius: 7,
                    fill: new ol.style.Fill({
                        color: '#ffcc33'
                    })
                })
            })
        });
        map.addLayer(vector);

        // 鼠标移动事件处理，用于更新提示框的位置和内容
        var pointerMoveHandler = function (evt) {
            if (evt.dragging) {
                return;
            }
            var helpMsg = '单击地图起点开始测量';

            if (sketch) {
                var geom = sketch.getGeometry();
                if (geom instanceof ol.geom.Polygon) {
                    helpMsg = continuePolygonMsg;
                } else if (geom instanceof ol.geom.LineString) {
                    helpMsg = continueLineMsg;
                }
            }

            helpTooltipElement.innerHTML = helpMsg;
            helpTooltip.setPosition(evt.coordinate);
            helpTooltipElement.classList.remove('hidden');
        };

        map.on('pointermove', pointerMoveHandler);
        map.getViewport().addEventListener('mouseout', function () {
            helpTooltipElement.classList.add('hidden');
        });

        // 格式化长度
        var formatLength = function (line) {
            var length = ol.sphere.getLength(line);
            var output;
            if (length > 100) {
                output = (Math.round(length / 1000 * 100) / 100) + ' ' + 'km';
            } else {
                output = (Math.round(length * 100) / 100) + ' ' + 'm';
            }
            return output;
        };

        // 格式化面积
        var formatArea = function (polygon) {
            var area = ol.sphere.getArea(polygon);
            var output;
            if (area > 10000) {
                output = (Math.round(area / 1000000 * 100) / 100) + ' ' + 'km<sup>2</sup>';
            } else {
                output = (Math.round(area * 100) / 100) + ' ' + 'm<sup>2</sup>';
            }
            return output;
        };

        // 创建帮助信息提示框
        function createHelpTooltip() {
            if (helpTooltipElement) {
                helpTooltipElement.parentNode.removeChild(helpTooltipElement);
            }
            helpTooltipElement = document.createElement('div');
            helpTooltipElement.className = 'tooltip hidden';
            helpTooltip = new ol.Overlay({
                element: helpTooltipElement,
                offset: [15, 0],
                positioning: 'center-left'
            });
            map.addOverlay(helpTooltip);
        }

        // 创建测量工具提示框
        function createMeasureTooltip() {
            if (measureTooltipElement) {
                measureTooltipElement.parentNode.removeChild(measureTooltipElement);
            }
            measureTooltipElement = document.createElement('div');
            measureTooltipElement.className = 'tooltip tooltip-measure';
            measureTooltip = new ol.Overlay({
                element: measureTooltipElement,
                offset: [0, -15],
                positioning: 'bottom-center',
                stopEvent: false,
                insertFirst: false
            });
            map.addOverlay(measureTooltip);
        }

        var typeSelect = document.getElementById('type');
        var draw; // global so we can remove it later

        function addInteraction() {
            var value = typeSelect.value;
            if (value === 'none') {
                return;
            }
            var type = (value === 'Area' ? 'Polygon' : 'LineString');
            draw = new ol.interaction.Draw({
                source: source,
                type: type,
                style: new ol.style.Style({
                    fill: new ol.style.Fill({
                        color: 'rgba(255, 255, 255, 0.2)'
                    }),
                    stroke: new ol.style.Stroke({
                        color: 'rgba(0, 0, 0, 0.5)',
                        lineDash: [10, 10],
                        width: 2
                    }),
                    image: new ol.style.Circle({
                        radius: 5,
                        stroke: new ol.style.Stroke({
                            color: 'rgba(0, 0, 0, 0.7)'
                        }),
                        fill: new ol.style.Fill({
                            color: 'rgba(255, 255, 255, 0.2)'
                        })
                    })
                })
            });
            map.addInteraction(draw);

            createMeasureTooltip();
            createHelpTooltip();

            var listener;

            // 为交互式图形绘制控件对象绑定 drawstart 事件
            draw.on('drawstart',
                function (evt) {
                    sketch = evt.feature; // 绘图要素
                    var tooltipCoord = evt.coordinate; // 绘制的坐标

                    // 绑定 change 事件, 根据绘制几何图形类型得到测量的距离或面积, 并将其显示
                    listener = sketch.getGeometry().on('change', function (evt) {
                        var geom = evt.target; // 绘制的几何图形
                        var output;
                        if (geom instanceof ol.geom.Polygon) {
                            // 输出面积值
                            output = formatArea(/** @type {ol.geom.Polygon} */(geom));
                            tooltipCoord = geom.getInteriorPoint().getCoordinates(); // 坐标
                        } else if (geom instanceof ol.geom.LineString) {
                            // 输出距离值
                            output = formatLength(/** @type {ol.geom.LineString} */(geom));
                            tooltipCoord = geom.getLastCoordinate(); // 坐标
                        }
                        // 将测量值添加到测量工具提示框中显示
                        measureTooltipElement.innerHTML = output;
                        // 设置测量工具提示框的显示位置
                        measureTooltip.setPosition(tooltipCoord);
                    });
                }, this);

            // 为交互式图形绘制控件对象绑定 drawend 事件
            draw.on('drawend',
                function (evt) {
                    // 设置测量工具提示框的样式
                    measureTooltipElement.className = 'tooltip tooltip-static';
                    measureTooltip.setOffset([0, -7]);
                    sketch = null; // 置空当前绘图要素对象
                    measureTooltipElement = null; // 置空测量工具提示框对象
                    createMeasureTooltip(); // 重新创建一个测量工具提示框来显示结果
                    ol.Observable.unByKey(listener);
                }, this);
        }

        // 当发生选框改变时重新添加绘制交互
        typeSelect.onchange = function () {
            map.removeInteraction(draw);
            // 切换工具时隐藏悬浮提示框

                helpTooltipElement.classList.add('hidden');

        // 清除按钮功能：清空矢量层并移除之前绘制的所有测量提示框
        document.getElementById('clearBtn').addEventListener('click', function () {

            var staticTooltips = document.querySelectorAll('.tooltip-static');
            staticTooltips.forEach(function (tooltip) {
                tooltip.parentNode.removeChild(tooltip);
            });

            // 如果有正在测量悬空的未结束标签，也清空内部文字
            if (measureTooltipElement) {
                measureTooltipElement.innerHTML = '';
            }
        });

        // --- 8. 添加地图编辑功能 ---
        var editSource = new ol.source.Vector();
        var editLayer = new ol.layer.Vector({
            source: editSource,
            style: new ol.style.Style({
                fill: new ol.style.Fill({
                    color: 'rgba(255, 0, 0, 0.2)'
                }),
                stroke: new ol.style.Stroke({
                    color: '#ff0000',
                    width: 2
                }),
                image: new ol.style.Circle({
                    radius: 7,
                    fill: new ol.style.Fill({
                        color: '#ff0000'
                    })
                })
            })
        });
        map.addLayer(editLayer);

        var editTypeSelect = document.getElementById('edit-type');
        var drawEdit, modifyEdit, snapEdit, selectEdit;

        // 初始化选择要素交互，用于删除单个要素
        selectEdit = new ol.interaction.Select({

        });
        map.addInteraction(selectEdit);

        function addEditInteraction() {
            var value = editTypeSelect.value;
            if (value === 'none') return;

            if (value === 'Modify') {
                modifyEdit = new ol.interaction.Modify({ source: editSource });
                map.addInteraction(modifyEdit);
            } else {
                drawEdit = new ol.interaction.Draw({
                    source: editSource,
                    type: value
                });
                map.addInteraction(drawEdit);
            }

            // 添加吸附交互，使编辑更精准
            snapEdit = new ol.interaction.Snap({ source: editSource });
            map.addInteraction(snapEdit);
        }

        // Ctrl+Z 撤回上一个点
        window.addEventListener('keydown', function (event) {
            // 支持 Ctrl+Z 或 Cmd+Z (Mac)
            if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'z') {
                var handled = false;
                // 优先撤回地图编辑中的点
                if (drawEdit) {
                    drawEdit.removeLastPoint();
                    handled = true;
                }
                // 如果编辑工具没在绘图，尝试撤回测量工具的点
                if (!handled && draw) {
                    draw.removeLastPoint();
                    handled = true;
                }

                if (handled) {
                    event.preventDefault(); // 阻止浏览器默认撤销行为
                }
            }
        });

        // 删除选中的单个要素按钮
        document.getElementById('deleteEditBtn').onclick = function () {
            var selectedFeatures = selectEdit.getFeatures();
            if (selectedFeatures.getLength() > 0) {

                    selectedFeatures.forEach(function (feature) {

                });
            } else {
                showCustomModal('alert', '提示', '请先使用鼠标，选择图层编辑后，再点击选中一个红色的图形，最后点击删除');
            }
        };

        // 监听编辑菜单切换
        editTypeSelect.onchange = function () {
            // 切换编辑工具前，先停下测量工具
            typeSelect.value = 'none';
            map.removeInteraction(draw);
            if (helpTooltipElement) helpTooltipElement.classList.add('hidden');


            map.removeInteraction(drawEdit);
            map.removeInteraction(modifyEdit);
            map.removeInteraction(snapEdit);

            // 如果选择了绘图模式，暂时停用选择器，避免点击干扰
            if (editTypeSelect.value !== 'none' && editTypeSelect.value !== 'Modify') {
                selectEdit.setActive(false);
            } else {
                selectEdit.setActive(true);
            }

            addEditInteraction();
        };

        // 修改测量菜单切换逻辑：切换测量时停下编辑工具
        var originalMeasurementChange = typeSelect.onchange;
        typeSelect.onchange = function () {
            // 停下编辑工具
            editTypeSelect.value = 'none';
            map.removeInteraction(drawEdit);
            map.removeInteraction(modifyEdit);
            map.removeInteraction(snapEdit);
            selectEdit.setActive(false);

            // 执行原有的测量逻辑
            originalMeasurementChange.call(this);
        };

        // 清空绘图按钮
        document.getElementById('clearEditBtn').onclick = function () {
            showCustomModal('confirm', '确认清空', '确定要删除所有的图形吗？', function () {
                editSource.clear();
                selectEdit.getFeatures().clear();
            });
        };

        /**
         * 显示自定义弹窗
         * @param {string} type 'alert' | 'confirm'
         * @param {string} title 
         * @param {string} message 
         * @param {function} onConfirm 
         */
        function showCustomModal(type, title, message, onConfirm) {
            const overlay = document.getElementById('custom-modal-overlay');
            const titleEl = document.getElementById('modal-title');
            const messageEl = document.getElementById('modal-message');
            const cancelBtn = document.getElementById('modal-cancel-btn');
            const confirmBtn = document.getElementById('modal-confirm-btn');

            titleEl.textContent = title;
            messageEl.textContent = message;

            if (type === 'alert') {
                cancelBtn.style.display = 'none';
            } else {
                cancelBtn.style.display = 'block';
            }

            const hideModal = () => {
                overlay.classList.remove('show');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 300);
            };

            const handleConfirm = () => {
                hideModal();
                if (onConfirm) onConfirm();
                cleanup();
            };

            const handleCancel = () => {
                hideModal();
                cleanup();
            };

            const cleanup = () => {
                confirmBtn.removeEventListener('click', handleConfirm);
                cancelBtn.removeEventListener('click', handleCancel);
            };

            confirmBtn.addEventListener('click', handleConfirm);
            cancelBtn.addEventListener('click', handleCancel);

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.add('show');
            }, 10);
        }


        //导出要素为 GeoJSON 并下载

        function downloadGeoJSON(features, filename) {
            if (features.length === 0) {
                showCustomModal('alert', '提示', '没有可导出的数据！');
                return;
            }
            var format = new ol.format.GeoJSON();
            var geojsonStr = format.writeFeatures(features, {
                dataProjection: 'EPSG:4326',
                featureProjection: 'EPSG:3857'
            });
            var blob = new Blob([geojsonStr], { type: 'application/json' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 导出全部按钮
        document.getElementById('exportAllBtn').onclick = function () {
            var features = editSource.getFeatures();
            downloadGeoJSON(features, 'features_all.geojson');
        };

        // 导出选中按钮
        document.getElementById('exportSelectedBtn').onclick = function () {
            var features = selectEdit.getFeatures().getArray();
            if (features.length === 0) {
                showCustomModal('alert', '提示', '请先选中要导出的要素！');
                return;
            }
            downloadGeoJSON(features, 'features_selected.geojson');
        };

        // --- 9. 从 markers.json 加载标注点 + Popup 弹窗 ---

        // 创建矢量层标注样式函数
        var createLabelStyle = function (feature) {
            return new ol.style.Style({
                image: new ol.style.Icon({
                    anchor: [0.5, 1],
                    anchorXUnits: 'fraction',
                    anchorYUnits: 'fraction',
                    scale: 0.1,
                    src: '定位.png'
                }),
                text: new ol.style.Text({
                    textAlign: 'center',
                    textBaseline: 'bottom',
                    offsetY: -35,
                    text: feature.get('name'),
                    font: 'bold 13px "Microsoft YaHei", sans-serif',
                    fill: new ol.style.Fill({ color: '#333' }),
                    stroke: new ol.style.Stroke({ color: '#fff', width: 3 }),
                    backgroundFill: new ol.style.Fill({ color: 'rgba(255, 255, 255, 0.85)' }),
                    backgroundStroke: new ol.style.Stroke({ color: 'rgba(0, 0, 0, 0.15)', width: 1 }),
                    padding: [4, 8, 4, 8]
                })
            });
        };

        // 标注点矢量图层
        var markerSource = new ol.source.Vector();
        var markerLayer = new ol.layer.Vector({ source: markerSource });
        map.addLayer(markerLayer);

        // --- Popup Overlay ---
        var popupEl = document.getElementById('popup');
        var popupCloser = document.getElementById('popup-closer');
        var popupOverlay = new ol.Overlay({
            element: popupEl,
            autoPan: true,
            autoPanAnimation: { duration: 250 },
            positioning: 'bottom-center',
            offset: [0, -40]
        });
        map.addOverlay(popupOverlay);

        // 关闭按钮
        popupCloser.addEventListener('click', function () {
            popupOverlay.setPosition(undefined);
            popupCloser.blur();
        });

        // 填充 popup 内容
        function showPopup(coordinate, props) {
            document.getElementById('popup-title').textContent = props.name;
            document.getElementById('popup-category').textContent = props.category || '';
            document.getElementById('popup-address').textContent = props.address || '';
            document.getElementById('popup-desc').textContent = props.description || '';

            var imgContainer = document.getElementById('popup-img-container');
            var imgEl = document.getElementById('popup-image');
            if (props.image && props.image.trim() !== "") {
                imgEl.src = "images/" + props.image;
                imgContainer.style.display = 'block';
            } else {
                imgContainer.style.display = 'none';
            }

            var popRow = document.getElementById('popup-population-row');
            if (props.population) {
                popRow.style.display = 'flex';
                document.getElementById('popup-population').textContent = props.population;
            } else {
                popRow.style.display = 'none';
            }

            popupOverlay.setPosition(coordinate);
        }

        // 点击地图上的标注点时显示 popup
        map.on('singleclick', function (evt) {
            // 如果测量或编辑工具激活，跳过
            if (document.getElementById('type').value !== 'none' ||
                document.getElementById('edit-type').value !== 'none') {
                return;
            }

            var feature = map.forEachFeatureAtPixel(evt.pixel, function (f, layer) {
                // 只识别标注图层上的 feature
                if (layer === markerLayer) return f;
            });

            if (feature) {
                var coord = feature.getGeometry().getCoordinates();
                showPopup(coord, {
                    name: feature.get('name'),
                    category: feature.get('category'),
                    address: feature.get('address'),
                    description: feature.get('description'),
                    population: feature.get('population'),
                    image: feature.get('image')
                });
            } else {
                // 点击空白处关闭 popup
                popupOverlay.setPosition(undefined);
            }
        });

        // 鼠标移到标注点时变为手型
        map.on('pointermove', function (evt) {
            if (evt.dragging) return;
            var hit = map.forEachFeatureAtPixel(evt.pixel, function (f, layer) {
                return layer === markerLayer;
            });
            map.getTargetElement().style.cursor = hit ? 'pointer' : '';
        });

        // --- 从 markers.json 加载数据 ---
        fetch('markers.json')
            .then(function (res) { return res.json(); })
            .then(function (data) {
                data.markers.forEach(function (m) {
                    var coord = ol.proj.fromLonLat([m.longitude, m.latitude]);
                    var feature = new ol.Feature({
                        geometry: new ol.geom.Point(coord),
                        name: m.name,
                        category: m.category,
                        description: m.description,
                        address: m.address,
                        population: m.population,
                        image: m.image
                    });
                    feature.setStyle(createLabelStyle(feature));
                    markerSource.addFeature(feature);
                });
            })
            .catch(function (err) {
                console.error('加载 markers.json 失败:', err);
            });

        // --- 10. 搜索景点功能与下拉框 ---
        var searchInput = document.getElementById('searchInput');
        var searchResults = document.getElementById('searchResults');

        // 监听输入，实时匹配
        searchInput.addEventListener('input', function () {
            var keyword = this.value.trim().toLowerCase();
            searchResults.innerHTML = '';

            if (!keyword) {
                searchResults.style.display = 'none';
                return;
            }

            var features = markerSource.getFeatures();
            var matches = [];

            // 简单模糊匹配
            for (var i = 0; i < features.length; i++) {
                var name = features[i].get('name') || '';
                var category = features[i].get('category') || '';
                var address = features[i].get('address') || '';

                if (name.toLowerCase().includes(keyword) ||
                    address.toLowerCase().includes(keyword) ||
                    category.toLowerCase().includes(keyword)) {
                    matches.push(features[i]);
                }
            }

            if (matches.length > 0) {
                searchResults.style.display = 'block';
                matches.forEach(function (feature) {
                    var li = document.createElement('li');
                    li.className = 'search-result-item';
                    li.innerHTML = '<strong>' + feature.get('name') + '</strong> <span style="color:#888;font-size:12px;margin-left:8px;">' + (feature.get('category') || '') + '</span>';

                    li.addEventListener('click', function () {
                        // 选择结果，清空下拉框
                        searchInput.value = feature.get('name');
                        searchResults.style.display = 'none';

                        var coord = feature.getGeometry().getCoordinates();

                        // 平滑移动并放大
                        map.getView().animate({
                            center: coord,
                            zoom: 13,
                            duration: 1000
                        });

                        setTimeout(function () {
                            showPopup(coord, {
                                name: feature.get('name'),
                                category: feature.get('category'),
                                address: feature.get('address'),
                                description: feature.get('description'),
                                population: feature.get('population'),
                                image: feature.get('image')
                            });
                        }, 1000);
                    });

                    searchResults.appendChild(li);
                });
            } else {
                searchResults.style.display = 'none';
            }
        });

        // 点击页面其他地方隐藏下拉框
        document.addEventListener('click', function (e) {
            if (e.target !== searchInput && e.target !== searchResults) {
                searchResults.style.display = 'none';
            }
        });

        // 点击搜索框如果里面有内容，重新显示下拉框
        searchInput.addEventListener('click', function () {
            if (this.value.trim() && searchResults.children.length > 0) {
                searchResults.style.display = 'block';
            }
        });
        var count = 10000;
        var features = new Array(count);
        var e = 4500000;

        // 1. 修复：循环体应该只包含生成点的逻辑
        for (var i = 0; i < count; i++) {
            var coordinates = [2 * Math.random() * e - e, 2 * Math.random() * e - e];
            features[i] = new ol.Feature(new ol.geom.Point(coordinates));
        }

        // 2. 修复：聚合数据源从循环里提取出来
        var source = new ol.source.Vector({ features: features });
        var clusterSource = new ol.source.Cluster({ distance: 40, source: source });

        // 3. 修复：原来代码中没有定义 clusterLayer，需要定义并给予聚合图标的样式
        var clusterLayer = new ol.layer.Vector({
            source: clusterSource,
            style: function (feature) {
                var size = feature.get('features').length;
                return new ol.style.Style({
                    image: new ol.style.Circle({
                        radius: 10 + Math.max(0, size.toString().length * 2), // 根据数量调整大小
                        stroke: new ol.style.Stroke({
                            color: '#fff'
                        }),
                        fill: new ol.style.Fill({
                            color: '#3399CC'
                        })
                    }),
                    text: new ol.style.Text({
                        text: size.toString(),
                        fill: new ol.style.Fill({
                            color: '#fff'
                        })
                    })
                });
            }
        });

        // 4. 修复：修改 getelementById 为 getElementById，并将绑定事件分离
        // 添加聚合标注
        document.getElementById('addFeatures').onclick = function () {
            var currentFeatures = clusterSource.getSource().getFeatures();
            // 修复：=是赋值，比较应该用 ===
            if (currentFeatures.length === 0) {
                // 如果数据源空了，就加回去
                clusterSource.getSource().addFeatures(features);
            }
            // 将图层添加到地图上（判断防重复添加）
            if (!map.getLayers().getArray().includes(clusterLayer)) {
                map.addLayer(clusterLayer);
            }
        };

        // 移除聚合标注
        document.getElementById('removeFeatures').onclick = function () {
            var currentFeatures = clusterSource.getSource().getFeatures();
            if (currentFeatures.length !== 0) {
                clusterSource.getSource().clear(); // 清空图层上的点
            }
            map.removeLayer(clusterLayer); // 将图层从地图卸载
        };


    </script>
</body>

</html>
