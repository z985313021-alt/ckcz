<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers 整合：坐标显示 + 鹰眼功能</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v7.3.0/ol.css" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/ol@v7.3.0/dist/ol.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; }
        
        /* 1. 地图容器 */
        #map {
            width: 100%;
            height: 100vh; /* 全屏显示 */
            position: relative;
            background-color: #f8f8f8;
        }

        /* 2. 坐标显示控件自定义样式 */
        .custom-mouse-position {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 13px;
            color: #333;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        /* 3. 鹰眼控件自定义样式 */
        /* 将其定位在右上角 */
        .ol-overviewmap {
            top: 10px;
            right: 10px;
            bottom: auto;
            left: auto;
        }

        /* 鹰眼内部地图窗口的样式 */
        .ol-overviewmap .ol-overviewmap-map {
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            height: 150px;
            width: 200px;
        }

        /* 鹰眼中表示当前视口的矩形框样式 */
        .ol-overviewmap .ol-overviewmap-box {
            border: 2px solid #ff4500;
            background-color: rgba(255, 69, 0, 0.1);
        }

        /* 覆盖 OpenLayers 默认按钮样式，使其更协调 */
        .ol-overviewmap button {
            background-color: #007bff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map">
        <div id="mouse-position" class="custom-mouse-position"></div>
    </div>

    <script>
        // 天地图 Key (请在正式生产环境下更换为您自己的 Key)
        const tdKey = "1d08d1bb963e96886d55e800461512b8";

        // --- 1. 定义图层 ---
        // 矢量底图
        const vecLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: `http://t0.tianditu.com/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=${tdKey}`,
                attributions: "天地图",
                wrapX: false
            })
        });

        // 矢量注记
        const cvaLayer = new ol.layer.Tile({
            source: new ol.source.XYZ({
                url: `http://t0.tianditu.com/DataServer?T=cva_w&x={x}&y={y}&l={z}&tk=${tdKey}`,
                wrapX: false
            })
        });

        // --- 2. 实例化控件 ---

        // 鼠标位置控件
        const mousePositionControl = new ol.control.MousePosition({
            coordinateFormat: ol.coordinate.createStringXY(4), // 保留4位小数
            projection: 'EPSG:4326', // 显示经纬度
            target: document.getElementById('mouse-position'),
            undefinedHTML: '请将鼠标移入地图'
        });

        // 鹰眼控件
        const overviewMapControl = new ol.control.OverviewMap({
            className: 'ol-overviewmap ol-custom-overviewmap', // 自定义CSS类名
            layers: [
                // 鹰眼中的图层，通常只放一个不带标注的简单底图
                new ol.layer.Tile({
                    source: new ol.source.XYZ({
                        url: `http://t0.tianditu.com/DataServer?T=vec_w&x={x}&y={y}&l={z}&tk=${tdKey}`
                    })
                })
            ],
            collapseLabel: '\u00BB', // 折叠图标
            label: '\u00AB',         // 展开图标
            collapsed: false         // 默认展开
        });

        // --- 3. 初始化地图 ---
        const map = new ol.Map({
            target: 'map',
            // 加载默认控件并添加我们的自定义控件
            controls: ol.control.defaults.defaults().extend([
                mousePositionControl,
                overviewMapControl
            ]),
            layers: [vecLayer, cvaLayer],
            view: new ol.View({
                center: ol.proj.fromLonLat([116.3974, 39.9093]), // 北京中心
                zoom: 10
            })
        });
    </script>
</body>
</html>
